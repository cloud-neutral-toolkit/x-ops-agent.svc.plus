name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build:
        description: 'Run build job'
        required: false
        type: boolean
        default: true
      unit:
        description: 'Run unit tests'
        required: false
        type: boolean
        default: true
      integration:
        description: 'Run integration tests'
        required: false
        type: boolean
        default: true
      fixtures:
        description: 'Run mock/fixtures'
        required: false
        type: boolean
        default: true
      release:
        description: 'Run release job'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    if: github.event_name != 'workflow_dispatch' || inputs.build == true
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, macos]
        arch: [amd64, arm64]
    runs-on: ${{ fromJson('{"linux":"ubuntu-latest","macos":"macos-latest"}')[matrix.platform] }}
    env:
      GOOS: ${{ fromJson('{"linux":"linux","macos":"darwin"}')[matrix.platform] }}
      GOARCH: ${{ matrix.arch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy & Verify
        run: |
          rm -f go.sum
          go mod tidy
          go mod verify

      - name: Run tests
        run: go test ./...

      - name: Build
        run: |
          mkdir -p bin
          go build -o bin/opsagent ./cmd/agent

      - name: Package artifact
        run: |
          NAME="opsagent-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "package/$NAME"
          cp -r bin "package/$NAME/"
          tar -C package -czf "package/$NAME.tar.gz" "$NAME"
          echo "ARTIFACT=package/$NAME.tar.gz" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsagent-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.ARTIFACT }}

  unit-tests:
    if: github.event_name != 'workflow_dispatch' || inputs.unit == true
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, macos]
        arch: [amd64, arm64]
    runs-on: ${{ fromJson('{"linux":"ubuntu-latest","macos":"macos-latest"}')[matrix.platform] }}
    env:
      GOOS: ${{ fromJson('{"linux":"linux","macos":"darwin"}')[matrix.platform] }}
      GOARCH: ${{ matrix.arch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: make test

  integration-tests:
    if: github.event_name != 'workflow_dispatch' || inputs.integration == true
    runs-on: ubuntu-latest
    env:
      GOOS: linux
      GOARCH: amd64
      CGO_ENABLED: 0
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ops?sslmode=disable
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start dependencies
        run: docker compose -f deploy/docker-compose.yml up -d

      - name: Run database migrations
        run: |
          go install github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          make migrate

      - name: Run integration tests
        run: make test

      - name: Stop dependencies
        if: always()
        run: docker compose -f deploy/docker-compose.yml down

  fixtures:
    if: github.event_name != 'workflow_dispatch' || inputs.fixtures == true
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, macos]
        arch: [amd64, arm64]
    runs-on: ${{ fromJson('{"linux":"ubuntu-latest","macos":"macos-latest"}')[matrix.platform] }}
    env:
      GOOS: ${{ fromJson('{"linux":"linux","macos":"darwin"}')[matrix.platform] }}
      GOARCH: ${{ matrix.arch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate mocks/fixtures
        run: echo "TODO: add mock and fixture generation"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name != 'workflow_dispatch' || inputs.release == true)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
