name: Build and Release OPSAgent

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [linux, windows, macos]
        arch: [amd64, arm64]
        exclude:
          - platform: windows
            arch: arm64
          - platform: macos
            arch: amd64
    # 选择与平台匹配的 runner（macOS/Windows/Linux）
    runs-on: ${{ fromJson('{"linux":"ubuntu-22.04","windows":"windows-latest","macos":"macos-latest"}')[matrix.platform] }}
    env:
      GOOS: ${{ matrix.platform }}
      GOARCH: ${{ matrix.arch }}
      CGO_ENABLED: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Tidy & Verify
        shell: bash
        run: |
          rm -f go.sum
          go mod tidy
          go mod verify

      - name: Run tests
        shell: bash
        run: go test ./...

      - name: Build
        shell: bash
        run: |
          mkdir -p bin
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            go build -o bin/opsagent.exe ./cmd/agent
          else
            go build -o bin/opsagent ./cmd/agent
          fi

      - name: Package artifact
        shell: bash
        run: |
          NAME="opsagent-${{ matrix.platform }}-${{ matrix.arch }}"
          mkdir -p "package/$NAME"
          cp -r bin "package/$NAME/"
          # 也可以根据需要把 README / LICENSE / configs 之类的放进去：
          # cp -r LICENSE README.md configs package/$NAME/ || true
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            (cd package && powershell -Command "Compress-Archive -Path '$NAME/*' -DestinationPath '$NAME.zip'")
            echo "ARTIFACT=package/$NAME.zip" >> $GITHUB_ENV
          else
            tar -C package -czf "package/$NAME.tar.gz" "$NAME"
            echo "ARTIFACT=package/$NAME.tar.gz" >> $GITHUB_ENV
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opsagent-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ env.ARTIFACT }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*  # 上传所有平台/架构的压缩包
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
